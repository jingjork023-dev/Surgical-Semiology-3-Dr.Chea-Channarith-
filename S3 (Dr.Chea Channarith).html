        let audioCtx = null;
        function playTone(freq, type, duration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const playCorrect = () => playTone(880, 'sine', 0.2);
        const playWrong = () => playTone(220, 'square', 0.2);

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            let totalPossible = 0;

            quizSections.forEach(section => {
                const sectionHtml = `
                    <div id="sec-${section.id}" class="space-y-8">
                        <div class="flex justify-between items-center border-b-4 border-indigo-100 pb-3">
                            <h2 class="text-2xl font-black text-indigo-900 uppercase">${section.title}</h2>
                            <button onclick="resetSection(${section.id})" class="redo-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                Redo Section
                            </button>
                        </div>
                        <div class="grid grid-cols-1 gap-6">
                            ${section.questions.map((q, qIdx) => {
                                totalPossible++;
                                return `
                                    <div class="bg-white p-6 border-l-8 border-indigo-500 rounded-2xl shadow-md hover:shadow-lg transition-shadow q-block" data-section="${section.id}" data-correct="${q.a}">
                                        <p class="font-bold text-lg mb-4 text-gray-800">${q.n}. ${q.q}</p>
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 options-grid">
                                            ${q.o.map((opt, oIdx) => {
                                                const letter = String.fromCharCode(65 + oIdx);
                                                return `
                                                    <label class="flex items-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:bg-indigo-50 transition-all relative">
                                                        <input type="radio" name="sec${section.id}-q${qIdx}" value="${letter}" class="hidden" onchange="checkAnswer(this)">
                                                        <span class="font-bold text-indigo-600 mr-3">${letter}.</span>
                                                        <span class="text-gray-700">${opt}</span>
                                                    </label>
                                                `;
                                            }).join('')}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', sectionHtml);
            });
            document.getElementById('max-score').textContent = totalPossible;
        }

        function checkAnswer(input) {
            const block = input.closest('.q-block');
            const grid = input.closest('.options-grid');
            const labels = grid.querySelectorAll('label');
            const selectedVal = input.value;
            const correctVal = block.dataset.correct;

            grid.classList.add('disabled-labels');

            labels.forEach(label => {
                const radio = label.querySelector('input');
                if (radio.value === correctVal) {
                    label.classList.add('option-correct');
                }
                if (radio.value === selectedVal && selectedVal !== correctVal) {
                    label.classList.add('option-incorrect');
                }
            });

            if (selectedVal === correctVal) {
                playCorrect();
            } else {
                playWrong();
            }
        }

        function resetSection(sectionId) {
            const blocks = document.querySelectorAll(`.q-block[data-section="${sectionId}"]`);
            blocks.forEach(block => {
                const grid = block.querySelector('.options-grid');
                grid.classList.remove('disabled-labels');
                const labels = grid.querySelectorAll('label');
                labels.forEach(l => {
                    l.classList.remove('option-correct', 'option-incorrect');
                    l.querySelector('input').checked = false;
                });
            });
        }

        function calculateScore() {
            let score = 0;
            const blocks = document.querySelectorAll('.q-block');
            blocks.forEach(block => {
                const checked = block.querySelector('input:checked');
                if (checked && checked.value === block.dataset.correct) {
                    score++;
                }
            });
            document.getElementById('total-score').textContent = score;
            document.getElementById('final-result').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onload = renderQuiz;
    </script>
</body>
</html>
